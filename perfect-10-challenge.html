<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect 10.00 Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #f0ede8;
    --muted: #666;
    --faint: #222;
    --green: #1D9E75;
    --amber: #BA7517;
    --red: #E24B4A;
    --hidden: #E24B4A;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body {
    padding: 2rem;
  }

  /* Subtle grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 420px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .header .eyebrow {
    font-size: 10px;
    letter-spacing: .25em;
    color: var(--muted);
    margin-bottom: .75rem;
    text-transform: uppercase;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 4.5rem);
    letter-spacing: .08em;
    line-height: 1;
    color: var(--text);
  }

  .header .rule {
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 1rem auto;
  }

  .header p {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
    letter-spacing: .04em;
    max-width: 280px;
    margin: 0 auto;
  }

  /* Timer Display */
  .display-area {
    position: relative;
    margin-bottom: 2rem;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .timer-frame {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: .75rem 2rem;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    min-width: 260px;
    text-align: center;
  }

  /* Scanline effect */
  .timer-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.015) 2px,
      rgba(255,255,255,0.015) 4px
    );
    pointer-events: none;
  }

  #timerEl {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5.5rem;
    letter-spacing: .06em;
    line-height: 1;
    color: var(--text);
    transition: color .2s ease;
    display: block;
    font-variant-numeric: tabular-nums;
  }

  .timer-label {
    font-size: 9px;
    letter-spacing: .2em;
    color: var(--muted);
    margin-top: .25rem;
    text-transform: uppercase;
  }

  /* Progress ticks */
  .tick-row {
    display: flex;
    gap: 3px;
    margin-top: 1rem;
    margin-bottom: 2.5rem;
    align-items: center;
  }

  .tick {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--faint);
    transition: background .06s;
    flex-shrink: 0;
  }

  .tick.lit {
    background: var(--tick-color, var(--green));
  }

  /* Big Button */
  .btn-wrap {
    position: relative;
    margin-bottom: 2rem;
  }

  /* Pulse ring — only visible when running */
  .btn-wrap::before {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1px solid var(--green);
    opacity: 0;
    transform: scale(.9);
    transition: opacity .3s, transform .3s;
    pointer-events: none;
  }

  .btn-wrap.pulsing::before {
    animation: pulse-ring 1.4s ease-out infinite;
  }

  @keyframes pulse-ring {
    0%   { opacity: .5; transform: scale(.9); }
    100% { opacity: 0;  transform: scale(1.15); }
  }

  #mainBtn {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: transform .08s, border-color .2s, background .2s;
    outline: none;
    position: relative;
    overflow: hidden;
  }

  #mainBtn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 30%, rgba(255,255,255,.04), transparent 70%);
    pointer-events: none;
  }

  #mainBtn:hover {
    border-color: #444;
    background: #1c1c1c;
  }

  #mainBtn:active {
    transform: scale(.94);
  }

  #btnLabel {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: .12em;
    color: var(--text);
    line-height: 1;
  }

  #btnHint {
    font-size: 9px;
    letter-spacing: .1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Result zone */
  .result-zone {
    min-height: 64px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .5rem;
  }

  #verdictEl {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: .1em;
    line-height: 1;
    transition: color .2s;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity .3s, transform .3s, color .2s;
  }

  #verdictEl.show {
    opacity: 1;
    transform: translateY(0);
  }

  #varianceEl {
    font-size: 11px;
    letter-spacing: .06em;
    color: var(--muted);
    opacity: 0;
    transition: opacity .3s .1s;
  }

  #varianceEl.show {
    opacity: 1;
  }

  /* Share button */
  #shareBtn {
    display: none;
    margin-top: .75rem;
    padding: 8px 22px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 2px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }

  #shareBtn:hover {
    border-color: #555;
    color: var(--text);
  }

  #copiedMsg {
    font-size: 10px;
    color: var(--green);
    letter-spacing: .06em;
    height: 14px;
    transition: opacity .3s;
  }

  /* Footer rule */
  .footer {
    margin-top: 3rem;
    font-size: 9px;
    letter-spacing: .15em;
    color: #333;
    text-align: center;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="wrapper">
  <header class="header">
    <p class="eyebrow">Reaction Challenge</p>
    <h1>Perfect 10.00</h1>
    <div class="rule"></div>
    <p>Timer hides at 3 seconds. Stop it at exactly 10.00. Trust your instincts.</p>
  </header>

  <div class="display-area">
    <div class="timer-frame">
      <span id="timerEl">0.00</span>
      <div class="timer-label">seconds elapsed</div>
    </div>
  </div>

  <div class="tick-row" id="ticks"></div>

  <div class="btn-wrap" id="btnWrap">
    <button id="mainBtn" aria-label="Start timer">
      <span id="btnLabel">START</span>
      <span id="btnHint">press to begin</span>
    </button>
  </div>

  <div class="result-zone">
    <div id="verdictEl"></div>
    <div id="varianceEl"></div>
    <button id="shareBtn">copy result</button>
    <div id="copiedMsg"></div>
  </div>

  <p class="footer">Test your internal clock &mdash; no peeking</p>
</div>

<script>
(function () {
  const timerEl   = document.getElementById('timerEl');
  const mainBtn   = document.getElementById('mainBtn');
  const btnLabel  = document.getElementById('btnLabel');
  const btnHint   = document.getElementById('btnHint');
  const btnWrap   = document.getElementById('btnWrap');
  const verdictEl = document.getElementById('verdictEl');
  const varianceEl= document.getElementById('varianceEl');
  const shareBtn  = document.getElementById('shareBtn');
  const copiedMsg = document.getElementById('copiedMsg');
  const ticksRow  = document.getElementById('ticks');

  const TICK_COUNT = 24;
  const HIDE_AT    = 3;
  const TARGET     = 10;

  // Build ticks
  for (let i = 0; i < TICK_COUNT; i++) {
    const d = document.createElement('div');
    d.className = 'tick';
    ticksRow.appendChild(d);
  }
  const ticks = [...ticksRow.querySelectorAll('.tick')];

  let startTime = 0, raf = null, running = false, finalScore = 0;
  let phase = 'idle'; // idle | running | done

  function updateTicks(elapsed) {
    const progress = Math.min(elapsed / TARGET, 1);
    const lit = Math.round(progress * TICK_COUNT);
    ticks.forEach((t, i) => {
      if (i < lit) {
        t.classList.add('lit');
        const pct = i / TICK_COUNT;
        t.style.setProperty('--tick-color',
          pct < 0.5  ? '#1D9E75' :
          pct < 0.85 ? '#BA7517' : '#E24B4A'
        );
      } else {
        t.classList.remove('lit');
      }
    });
  }

  function loop() {
    const elapsed = (Date.now() - startTime) / 1000;
    if (elapsed >= HIDE_AT) {
      timerEl.textContent = '??.??';
      timerEl.style.color = '#E24B4A';
    } else {
      timerEl.textContent = elapsed.toFixed(2);
      timerEl.style.color = 'var(--text)';
    }
    updateTicks(elapsed);
    raf = requestAnimationFrame(loop);
  }

  function start() {
    phase = 'running';
    running = true;
    startTime = Date.now();
    timerEl.style.color = 'var(--text)';
    btnLabel.textContent = 'STOP';
    btnHint.textContent = 'press to stop';
    btnWrap.classList.add('pulsing');
    verdictEl.classList.remove('show');
    varianceEl.classList.remove('show');
    shareBtn.style.display = 'none';
    copiedMsg.textContent = '';
    raf = requestAnimationFrame(loop);
  }

  function stop() {
    phase = 'done';
    running = false;
    cancelAnimationFrame(raf);
    btnWrap.classList.remove('pulsing');

    finalScore = parseFloat(((Date.now() - startTime) / 1000).toFixed(2));
    timerEl.textContent = finalScore.toFixed(2);
    updateTicks(finalScore);

    const variance = Math.abs(TARGET - finalScore);
    const v = variance.toFixed(2);

    if (variance === 0) {
      timerEl.style.color = '#1D9E75';
      verdictEl.style.color = '#1D9E75';
      verdictEl.textContent = 'PERFECT. ABSOLUTE LEGEND.';
      varianceEl.textContent = 'exactly 10.00 — are you even human?';
    } else if (variance <= 0.05) {
      timerEl.style.color = '#1D9E75';
      verdictEl.style.color = '#1D9E75';
      verdictEl.textContent = 'INCREDIBLE';
      varianceEl.textContent = 'off by ' + v + 's — elite timing';
    } else if (variance <= 0.15) {
      timerEl.style.color = '#BA7517';
      verdictEl.style.color = '#BA7517';
      verdictEl.textContent = 'SO CLOSE';
      varianceEl.textContent = 'off by ' + v + 's — nearly there';
    } else if (variance <= 0.50) {
      timerEl.style.color = '#BA7517';
      verdictEl.style.color = '#BA7517';
      verdictEl.textContent = 'DECENT';
      varianceEl.textContent = 'off by ' + v + 's — you can do better';
    } else {
      timerEl.style.color = '#E24B4A';
      verdictEl.style.color = '#E24B4A';
      verdictEl.textContent = 'NOT EVEN CLOSE';
      varianceEl.textContent = 'off by ' + v + 's — try again';
    }

    // Animate in verdict
    requestAnimationFrame(() => {
      verdictEl.classList.add('show');
      varianceEl.classList.add('show');
    });

    btnLabel.textContent = 'RESET';
    btnHint.textContent = 'go again';
    shareBtn.style.display = 'block';
  }

  function reset() {
    phase = 'idle';
    timerEl.textContent = '0.00';
    timerEl.style.color = 'var(--text)';
    btnLabel.textContent = 'START';
    btnHint.textContent = 'press to begin';
    verdictEl.classList.remove('show');
    varianceEl.classList.remove('show');
    shareBtn.style.display = 'none';
    copiedMsg.textContent = '';
    ticks.forEach(t => { t.classList.remove('lit'); });
  }

  mainBtn.addEventListener('click', () => {
    if (phase === 'idle')    start();
    else if (phase === 'running') stop();
    else                    reset();
  });

  shareBtn.addEventListener('click', () => {
    const diff = (TARGET - finalScore).toFixed(2);
    const ev = diff === '0.00' ? 'PERFECT 10.00!' : 'off by ' + Math.abs(diff) + 's';
    const txt = 'PERFECT 10.00 CHALLENGE\nMy time: ' + finalScore.toFixed(2) + 's (' + ev + ')\nCan you hit a blind 10.00? Test your internal clock!';
    navigator.clipboard.writeText(txt).then(() => {
      copiedMsg.textContent = 'copied to clipboard';
      setTimeout(() => { copiedMsg.textContent = ''; }, 2000);
    }).catch(() => {
      copiedMsg.textContent = 'copy failed';
    });
  });
})();
</script>
</body>
</html>
